name: Build and Deploy

on:
  push:
    branches: [master]

jobs:
  build:
    environment: Production
    name: Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install
        run: npm ci

      - name: Lint and type check
        run: npm run check

      - name: Test
        run: npm run test

      - name: Build
        env:
          VITE_SESSION_WEBSOCKET_URL: ${{ vars.SESSION_WEBSOCKET_URL }}
          VITE_SESSION_API_URL: ${{ vars.SESSION_API_URL }}
          VITE_COLLECT_BASE_URL: ${{ vars.COLLECT_BASE_URL }}
        run: npm run build

      - name: Deploy to VPS
        env:
          SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          rsync -az --delete \
            -e "ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no -p 22" \
            build/ \
            ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:/srv/websites/ordsky.no/
